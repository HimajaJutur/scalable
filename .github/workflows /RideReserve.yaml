name: Build and Deploy TicketBuddy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment bundle
        run: |
          cd ticketbuddy_new
          zip -r ../app.zip . \
            -x "env/*" "**/__pycache__/*" ".git/*" ".github/*" "*.pyc" "*.egg-info/*"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ticketbuddy-app-zip
          path: ./app.zip
          retention-days: 5

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ticketbuddy-app-zip

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install EB CLI
        run: |
          python -m pip install --upgrade pip
          pip install awsebcli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify environment exists
        run: |
          aws elasticbeanstalk describe-environments \
            --application-name ${{ secrets.EB_APP_NAME }} \
            --environment-names ${{ secrets.EB_ENV_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Deploy to Elastic Beanstalk
        run: |
          cd ticketbuddy_new

          eb init ${{ secrets.EB_APP_NAME }} \
            --region ${{ secrets.AWS_REGION }} \
            --platform "Python 3.9 running on 64bit Amazon Linux 2023"

          eb deploy ${{ secrets.EB_ENV_NAME }} \
            --label "deploy-${{ github.run_id }}" \
            --timeout 20
