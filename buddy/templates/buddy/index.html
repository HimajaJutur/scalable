{% extends "buddy/base.html" %}
{% load static %}
{% block title %}Dashboard – RideReserve{% endblock %}
{% block content %}
<style>
    .section-bg {
        width: 100%;
        min-height: 78vh;
        background-image: url("{% static 'images/bus.jpeg' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    .section-bg::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.55));
        z-index: 1;
    }

    .welcome-box {
        position: relative;
        z-index: 2;
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(10px);
        padding: 45px;
        border-radius: 18px;
        width: 50%;
        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        animation: fadeIn 1.2s ease;
    }

    .welcome-title {
        font-size: 45px;
        font-weight: 800;
        color: #ffffff;
        margin-bottom: 10px;
        text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .welcome-text {
        font-size: 20px;
        margin-bottom: 25px;
        color: #f2f2f2;
        text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    .action-btn {
        background: #f0c040;
        color: #1a1a2e;
        padding: 14px 28px;
        border-radius: 10px;
        margin: 8px;
        text-decoration: none;
        font-size: 18px;
        font-weight: 600;
        transition: 0.3s;
        display: inline-block;
    }

    .action-btn:hover {
        background: #e0b030;
        box-shadow: 0 0 15px rgba(255,255,255,0.7);
        transform: translateY(-3px);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="section-bg">
    <div class="welcome-box">
        <div class="welcome-title">Welcome, {{ request.session.username }} 👋</div>
        <div class="welcome-text">
            Book and manage your carpool rides easily across Ireland.
        </div>
        <a href="/schedules" class="action-btn">🚗 Book a Ride</a>
        <a href="/history" class="action-btn">📄 My Rides</a>
        <a href="/alerts" class="action-btn">🔔 Travel Alerts</a>
    </div>
</div>
{% endblock %}
